<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - IKELIGHTS MEDIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Rockwell&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rockwell', serif;
            background: linear-gradient(135deg, #36454F 0%, #E2725B 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 450px;
            padding: 40px;
            animation: fadeInUp 0.5s ease;
        }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h1 { color: #36454F; font-size: 28px; }
        .login-header h1 span { color: #E2725B; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #36454F; font-weight: bold; }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }
        .form-group input:focus { outline: none; border-color: #E2725B; }
        .login-btn {
            width: 100%;
            background: #E2725B;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .login-btn:hover { background: #c95a40; }
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .info-message {
            background: #e3f2fd;
            color: #1976d2;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 12px;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>IKELIGHTS <span>MEDIA</span></h1>
            <p>Admin Dashboard Login</p>
        </div>
        
        <div class="info-message">
            <i class="fas fa-info-circle"></i> Default credentials: admin / admin123
        </div>
        
        <div id="errorMsg" class="error-message" style="display: none;"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" required autofocus>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="login-btn">Login to Dashboard</button>
        </form>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === 'admin' && password === 'admin123') {
                localStorage.setItem('admin_logged_in', 'true');
                window.location.href = 'index.html';
            } else {
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.textContent = 'Invalid username or password';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
