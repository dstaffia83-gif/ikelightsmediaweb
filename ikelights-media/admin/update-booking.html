<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Booking - IKELIGHTS MEDIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Rockwell&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Rockwell', serif; background: #f5f5f7; padding: 50px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; }
        h2 { color: #36454F; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #36454F; }
        select, input { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-family: inherit; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; margin-right: 10px; }
        .btn-primary { background: #E2725B; color: white; }
        .btn-secondary { background: #999; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h2><i class="fas fa-edit"></i> Update Booking Status</h2>
        
        <div class="form-group">
            <label>Status</label>
            <select id="status">
                <option value="pending">Pending</option>
                <option value="confirmed">Confirmed</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Payment Status</label>
            <select id="paymentStatus">
                <option value="pending">Pending</option>
                <option value="partial">Partial</option>
                <option value="paid">Paid</option>
            </select>
        </div>
        
        <button class="btn btn-primary" onclick="updateBooking()">Update Booking</button>
        <button class="btn btn-secondary" onclick="window.location.href='index.html'">Cancel</button>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const bookingId = urlParams.get('id');
        
        if (!bookingId) {
            window.location.href = 'index.html';
        }
        
        function updateBooking() {
            const status = document.getElementById('status').value;
            const paymentStatus = document.getElementById('paymentStatus').value;
            
            let bookings = JSON.parse(localStorage.getItem('ikelights_bookings') || '[]');
            const index = bookings.findIndex(b => b.id == bookingId);
            
            if (index !== -1) {
                bookings[index].status = status;
                bookings[index].paymentStatus = paymentStatus;
                localStorage.setItem('ikelights_bookings', JSON.stringify(bookings));
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
